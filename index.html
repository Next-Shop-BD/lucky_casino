<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOMBIE - লাকি কয়েন ক্যাসিনো 🕷️</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Bangers&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bangers', cursive;
            background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d004d, #4a0072);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Jombie Particles */
        .particle {
            position: absolute;
            color: rgba(255,255,255,0.3);
            font-size: 2em;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .container {
            background: rgba(0, 0, 51, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(138, 43, 226, 0.5);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 
                0 25px 50px rgba(138, 43, 226, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
            max-width: 550px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Creepster', cursive;
            font-size: 3.5em;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,0,255,0.5);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #ff00ff); }
            to { filter: drop-shadow(0 0 20px #00ffff); }
        }

        .tagline {
            color: #00ff88;
            font-size: 1.3em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00ff88;
        }

        .balance {
            font-size: 2em;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700;
        }

        .bet-section {
            margin: 30px 0;
        }

        input[type="number"] {
            width: 140px;
            padding: 15px;
            font-size: 20px;
            font-family: 'Bangers', cursive;
            border: 2px solid #8a2be2;
            border-radius: 15px;
            text-align: center;
            margin: 0 15px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255,0,255,0.5);
            transform: scale(1.05);
        }

        .buttons {
            margin: 40px 0;
        }

        button {
            padding: 18px 40px;
            font-size: 22px;
            font-family: 'Bangers', cursive;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 15px;
            transition: all 0.4s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        .bet-btn {
            background: linear-gradient(45deg, #ff0080, #ff4d94, #ff80ab);
            color: white;
            box-shadow: 0 15px 30px rgba(255,0,128,0.4);
        }

        .bet-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255,0,128,0.6);
        }

        .reset-btn {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: #000;
            box-shadow: 0 15px 30px rgba(0,255,136,0.4);
        }

        .reset-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,255,136,0.6);
        }

        .coin {
            width: 180px;
            height: 180px;
            margin: 40px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            transition: all 1.5s;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ff6b35);
            box-shadow: 
                0 25px 50px rgba(255,215,0,0.5),
                inset 0 5px 10px rgba(255,255,255,0.3);
            border: 5px solid #8a2be2;
        }

        .coin.spinning {
            animation: jombieSpin 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes jombieSpin {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            50% { transform: rotateY(720deg) rotateX(360deg) scale(1.1); }
            100% { transform: rotateY(1440deg) rotateX(720deg) scale(1); }
        }

        .result {
            font-size: 2.2em;
            margin: 30px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Creepster', cursive;
        }

        .win { 
            color: #00ff88; 
            text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88;
            animation: winPulse 1s infinite;
        }

        .lose { 
            color: #ff4757; 
            text-shadow: 0 0 30px #ff4757, 0 0 60px #ff4757;
            animation: loseShake 0.5s infinite;
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes loseShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat {
            background: rgba(138, 43, 226, 0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .stat:hover {
            transform: translateY(-5px);
            background: rgba(138, 43, 226, 0.5);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: rgba(255,255,255,0.7);
            font-family: Arial, sans-serif;
        }

        @media (max-width: 600px) {
            .logo { font-size: 2.5em; }
            .container { padding: 25px; margin: 20px; }
            input[type="number"] { width: 120px; }
            button { padding: 15px 25px; font-size: 18px; }
            .coin { width: 140px; height: 140px; font-size: 4em; }
        }
    </style>
</head>
<body>
    <!-- Floating Jombie Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;">🕷️</div>
    <div class="particle" style="left: 20%; animation-delay: 1s;">🕸️</div>
    <div class="particle" style="left: 80%; animation-delay: 2s;">🕷️</div>
    <div class="particle" style="left: 90%; animation-delay: 3s;">🕸️</div>

    <div class="container">
        <div class="logo">JOMBIE 🕷️</div>
        <div class="tagline">লাকি কয়েন ক্যাসিনো | Double or Nothing!</div>
        
        <div class="balance">
            💰 Balance: $<span id="balance">1000</span>
        </div>

        <div class="bet-section">
            <label style="font-size: 1.4em;">Bet Amount: </label>
            <input type="number" id="betAmount" min="10" max="500" value="50">
        </div>

        <div class="buttons">
            <button class="bet-btn" onclick="flipCoin()">
                🕷️ JOMBIE FLIP
            </button>
            <button class="reset-btn" onclick="resetGame()">
                🔄 Reset Game
            </button>
        </div>

        <div class="coin" id="coin">
            🪙
        </div>

        <div class="result" id="result"></div>

        <div class="stats">
            <div class="stat">
                🏆 Wins: <span id="wins">0</span>
            </div>
            <div class="stat">
                💀 Losses: <span id="losses">0</span>
            </div>
            <div class="stat">
                📊 Win Rate: <span id="winRate">0%</span>
            </div>
            <div class="stat">
                🎯 Total Flips: <span id="totalFlips">0</span>
            </div>
        </div>

        <div class="footer">
            ⚠️ Demo Mode | For Entertainment Only
        </div>
    </div>

    <script>
        let balance = 1000;
        let wins = 0;
        let losses = 0;
        let totalFlips = 0;
        let isSpinning = false;

        function updateDisplay() {
            document.getElementById('balance').textContent = balance.toLocaleString();
            document.getElementById('wins').textContent = wins.toLocaleString();
            document.getElementById('losses').textContent = losses.toLocaleString();
            document.getElementById('totalFlips').textContent = totalFlips.toLocaleString();
            
            const winRate = (totalFlips > 0) ? Math.round((wins / totalFlips) * 100) : 0;
            document.getElementById('winRate').textContent = winRate + '%';
            
            // Balance color change
            const balanceEl = document.getElementById('balance');
            if (balance > 1500) {
                balanceEl.style.color = '#00ff88';
            } else if (balance < 500) {
                balanceEl.style.color = '#ff4757';
            } else {
                balanceEl.style.color = '#ffd700';
            }
        }

        function playSound(type) {
            // Add Web Audio API for sound effects
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'win') {
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
            } else {
                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2);
            }
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function flipCoin() {
            if (isSpinning) return;

            const betAmount = parseInt(document.getElementById('betAmount').value);
            
            if (betAmount > balance || betAmount < 10) {
                alert('❌ অবৈধ বেট! ন্যূনতম $10, সর্বোচ্চ তোমার ব্যালেন্স।');
                return;
            }

            isSpinning = true;
            const coin = document.getElementById('coin');
            const resultDiv = document.getElementById('result');
            
            // Disable buttons during spin
            document.querySelector('.bet-btn').disabled = true;
            document.querySelector('.reset-btn').disabled = true;
            
            // Start spinning
            coin.classList.add('spinning');
            resultDiv.textContent = '🕷️ JOMBIE ঘুরছে... লাকি হও!';

            totalFlips++;

            // Random result with slight house edge (48% win chance)
            const isWin = Math.random() < 0.48;
            
            setTimeout(() => {
                coin.classList.remove('spinning');
                
                if (isWin) {
                    // Win - 1.95x payout (house edge)
                    const winnings = Math.floor(betAmount * 1.95);
                    balance += winnings;
                    wins++;
                    resultDiv.innerHTML = '🕷️<br>🎉 JOMBIE WIN! +$' + winnings.toLocaleString();
                    resultDiv.className = 'result win';
                    coin.innerHTML = '🪙<br>WIN';
                    playSound('win');
                } else {
                    balance -= betAmount;
                    losses++;
                    resultDiv.innerHTML = '🕷️<br>💥 JOMBIE LOSE! -$ ' + betAmount.toLocaleString();
                    resultDiv.className = 'result lose';
                    coin.innerHTML = '📉<br>LOSE';
                    playSound('lose');
                }

                updateDisplay();
                isSpinning = false;
                
                // Re-enable buttons
                document.querySelector('.bet-btn').disabled = false;
                document.querySelector('.reset-btn').disabled = false;

                if (balance <= 0) {
                    setTimeout(() => {
                        alert('💀 JOMBIE খেয়ে ফেলেছে! Game Over!\n🔄 Reset করে আবার খেলো!');
                    }, 500);
                }
            }, 2500);
        }

        function resetGame() {
            if (isSpinning) return;
            
            balance = 1000;
            wins = 0;
            losses = 0;
            totalFlips = 0;
            updateDisplay();
            document.getElementById('result').textContent = '';
            document.getElementById('result').className = 'result';
            document.getElementById('coin').innerHTML = '🪙';
            document.getElementById('betAmount').value = '50';
        }

        // Auto bet amount adjust
        document.getElementById('betAmount').addEventListener('input', function() {
            const value = parseInt(this.value);
            if (value > balance) {
                this.value = balance;
            }
        });

        // Keyboard support
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCoin();
            }
            if (e.code === 'Enter') {
                flipCoin();
            }
            if (e.code === 'KeyR') {
                resetGame();
            }
        });

        // Initialize
        updateDisplay();
        
        // Welcome message
        setTimeout(() => {
            console.log('🎮 JOMBIE Controls:\nSpace/Enter = Flip\nR = Reset\nEnjoy responsibly! 🕷️');
        }, 100);
    </script>
</body>
</html>
